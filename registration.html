<!DOCTYPE html>
<html>

<head>
    <title>II BTech II Sem Registration Form</title>
</head>

<body>

    <h2 align="center">II BTech II Sem 25-26 Registration Form</h2>

    <form>
        <table border="1" align="center" cellpadding="8" width="100">

            2
            <tr>
                <td>Registration No </td>
                <td><input type="text" name="regno" required></td>
            </tr>

            <tr>
                <td>Password </td>
                <td><input type="password" name="password" required></td>
            </tr>

            <tr>
                <td>Year & Semester </td>
                <td>
                    <select name="yearsem" required>
                        <option value="">--Choose--</option>
                        <option>II BTech I Sem</option>
                        <option selected>II BTech II Sem</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Branch </td>
                <td>
                     <input type="radio" name="branch" value="CST"> CST
                    <input type="radio" name="branch" value="CSE"> CSE
                    <input type="radio" name="branch" value="ECE"> ECE
                    <input type="radio" name="branch" value="EEE"> EEE
                    <input type="radio" name="branch" value="CE"> CE
                </td>
            </tr>

            <tr>
                <td>Name</td>
                <td><input type="text" name="name" required></td>
            </tr>

            <tr>
                <td>AadhaarNo </td>
                <td><input type="number" name="aadhaar" required></td>
            </tr>

            <tr>
                <td>Date of Birth </td>
                <td><input type="date" name="dob" required></td>
            </tr>

            <tr>
                <td>Bloodgroup </td>
                <td>
                     <input type="radio" name="blood" value="O+"> O+VE
                    <input type="radio" name="blood" value="O-"> O-VE
                    <input type="radio" name="blood" value="B+"> B+VE
                    <input type="radio" name="blood" value="B-"> B-VE
                     <input type="radio" name="blood" value="A-"> A-VE
                    <input type="radio" name="blood" value="A+"> A+VE
                </td>
            </tr>

            <tr>
                <td>Hobbies </td>
                <td>
                    <input type="checkbox" name="hobby" value="music"> music
                    <input type="checkbox" name="hobby" value="learning new things"> learning new things
                    <input type="checkbox" name="hobby" value="Watching Movies"> watching movies
                    <input type="checkbox" name="hobby" value="Coding"> Coding
                </td>
            </tr>

            <tr>
                <td>Address </td>
                <td>
                    <textarea name="address" rows="4" cols="30"></textarea>
                </td>
            </tr>

            <tr align="center">
                <td colspan="2">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>

        </table>
    </form>

</body>

</html>
